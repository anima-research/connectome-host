name: Build & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build:web

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    # OIDC trusted publishing: GitHub mints a short-lived id-token, npm CLI
    # exchanges it for a publish credential. No long-lived NPM_TOKEN secret.
    # npm-side config: npmjs.com -> package -> Settings -> Trusted Publishers
    # -> GitHub Actions, matching the repo + this workflow path.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Require changelog section for this release
        run: |
          ver="${GITHUB_REF_NAME#v}"
          esc=$(printf '%s' "$ver" | sed 's/[.]/\\./g')
          if ! grep -Eq "^## ${esc}([^0-9]|$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## ${ver}' section for tag ${GITHUB_REF_NAME}. Retitle the Unreleased section before tagging (see CONTRIBUTING.md)."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # node 24 ships npm >= 11.5.1, required for OIDC publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build:web

      - name: Publish
        run: npm publish --access public --provenance
